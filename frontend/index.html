<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kanee</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #07070d;
      --bg-1: #0c0c16;
      --panel: rgba(16, 17, 28, 0.72);
      --panel-solid: #12121e;
      --line: rgba(120, 150, 220, 0.14);
      --line-strong: rgba(120, 150, 220, 0.28);
      --text: #ecedf6;
      --muted: #8a8ca6;
      --cyan: #5fd9ff;
      --cyan-soft: #b6f0ff;
      --violet: #c79bf0;
      --glow: rgba(95, 217, 255, 0.55);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 600px at 50% -10%, #16182a 0%, transparent 60%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ---- header ---------------------------------------------------------- */
    header {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.7rem 1.1rem;
      background: linear-gradient(180deg, rgba(20, 22, 38, 0.6), rgba(10, 11, 20, 0.3));
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 0 rgba(95, 217, 255, 0.06);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    .brand { display: flex; align-items: baseline; gap: 0.5rem; }
    .brand-orb {
      align-self: center;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #d7f6ff, var(--cyan) 60%, #2b8fc0);
      box-shadow: 0 0 8px var(--glow), 0 0 16px rgba(95, 217, 255, 0.35);
      animation: orb-pulse 3.2s ease-in-out infinite;
    }
    @keyframes orb-pulse {
      0%, 100% { opacity: 0.75; transform: scale(0.92); }
      50%      { opacity: 1;    transform: scale(1.08); }
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, var(--cyan-soft), var(--violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand-sub {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #state {
      font-size: 0.72rem;
      padding: 0.2rem 0.7rem 0.2rem 0.6rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(40, 42, 60, 0.55);
      border: 1px solid var(--line);
      color: var(--muted);
      text-transform: capitalize;
      transition: background 0.25s, color 0.25s, border-color 0.25s;
    }
    #state::before {
      content: "";
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 6px currentColor;
    }
    #state.listening { background: rgba(29, 64, 48, 0.55); color: #7be0a8; border-color: rgba(123, 224, 168, 0.4); }
    #state.thinking  { background: rgba(61, 53, 32, 0.55); color: #e8c66a; border-color: rgba(232, 198, 106, 0.4); }
    #state.speaking  { background: rgba(32, 48, 77, 0.6);  color: #7ab4f0; border-color: rgba(122, 180, 240, 0.45); }
    #state.listening::before, #state.speaking::before { animation: dot-blink 1.1s ease-in-out infinite; }
    @keyframes dot-blink { 50% { opacity: 0.3; } }

    #conn {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    #conn::before {
      content: "";
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #d05a6e;
      box-shadow: 0 0 6px rgba(208, 90, 110, 0.7);
    }
    #conn.ok { color: #6fd3a0; }
    #conn.ok::before { background: #6fd3a0; box-shadow: 0 0 6px rgba(111, 211, 160, 0.7); }

    /* ---- stage / viewport ----------------------------------------------- */
    #stage {
      flex: 1;
      display: flex;
      min-height: 0;
      position: relative;
    }

    /* ---- customization sidebar (collapsible) ---------------------------- */
    #menu-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.45rem 0.55rem;
    }
    #sidebar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 300px;
      max-width: 82vw;
      z-index: 6;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, rgba(14, 15, 26, 0.95), rgba(9, 10, 18, 0.95));
      border-right: 1px solid var(--line-strong);
      box-shadow: 8px 0 30px rgba(0, 0, 0, 0.45);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(120, 150, 220, 0.35) transparent;
    }
    #sidebar.open { transform: translateX(0); }
    .side-head {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      font-size: 0.9rem;
      background: rgba(12, 13, 24, 0.96);
      border-bottom: 1px solid var(--line);
    }
    #side-close { padding: 0.3rem 0.42rem; }
    .side-sec { padding: 0.85rem 1rem; border-bottom: 1px solid var(--line); }
    .side-sec h2 {
      margin: 0 0 0.65rem;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .side-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .side-list.busy { opacity: 0.6; pointer-events: none; }
    .side-item {
      width: 100%;
      text-align: left;
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      background: rgba(30, 32, 48, 0.6);
      border: 1px solid var(--line);
    }
    .side-item:hover { background: rgba(44, 47, 70, 0.82); }
    .side-item.active {
      border-color: rgba(95, 217, 255, 0.6);
      color: var(--cyan-soft);
      background: rgba(20, 44, 60, 0.7);
      box-shadow: inset 0 0 0 1px rgba(95, 217, 255, 0.25);
    }
    .side-item.loading { opacity: 0.7; }
    .side-item.loading::after { content: " …"; }
    .side-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.45rem; }
    .side-emote {
      padding: 0.6rem 0.5rem;
      border-radius: 10px;
      background: rgba(30, 32, 48, 0.6);
      border: 1px solid var(--line);
      font-size: 0.82rem;
    }
    .side-emote:hover {
      background: rgba(50, 40, 72, 0.82);
      border-color: rgba(199, 155, 240, 0.5);
      color: var(--violet);
    }
    .side-empty { margin: 0; font-size: 0.78rem; color: var(--muted); }
    #viewport {
      flex: 1;
      position: relative;
      min-width: 0;
      background: #05050a;
    }
    #viewport canvas { display: block; }
    /* soft vignette to seat the character in the scene (above canvas, below UI) */
    #viewport::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 160px 30px rgba(0, 0, 0, 0.55);
      z-index: 1;
    }
    #viewport-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2rem;
      pointer-events: none;
      white-space: pre-line;
      z-index: 2;
    }

    /* stream-chat overlay: compact rows over the right edge of the stage */
    #log {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(360px, 40vw);
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow-y: auto;
      z-index: 3;
      background: linear-gradient(to left, rgba(6, 7, 14, 0.72), rgba(6, 7, 14, 0.18) 70%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, #000 28px);
      mask-image: linear-gradient(to bottom, transparent, #000 28px);
      scrollbar-width: thin;
      scrollbar-color: rgba(120, 150, 220, 0.35) transparent;
    }
    #log::-webkit-scrollbar { width: 6px; }
    #log::-webkit-scrollbar-thumb { background: rgba(120, 150, 220, 0.3); border-radius: 999px; }
    #log::before { content: ""; flex: 1 0 auto; } /* pin messages to the bottom */
    .msg {
      font-size: 0.86rem;
      line-height: 1.4;
      padding: 0.4rem 0.65rem;
      border-radius: 10px;
      max-width: 100%;
      background: rgba(20, 22, 34, 0.66);
      border: 1px solid var(--line);
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
      white-space: pre-wrap;
      overflow-wrap: break-word;
      animation: chat-in 0.18s ease-out;
    }
    .msg.user  { align-self: flex-end; border-color: rgba(95, 217, 255, 0.28); background: rgba(18, 32, 44, 0.66); }
    .msg.kanee { align-self: flex-start; border-color: rgba(199, 155, 240, 0.26); }
    .msg .name {
      font-weight: 700;
      margin-right: 0.45rem;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .msg.user .name  { color: var(--cyan); }
    .msg.kanee .name { color: var(--violet); }
    @keyframes chat-in { from { opacity: 0; transform: translateY(6px); } }
    .seg + .seg::before { content: " "; }
    .seg-tags {
      color: #6b6e92;
      font-size: 0.6rem;
      margin-right: 0.25rem;
      -webkit-user-select: none;
      user-select: none;
    }
    .mic-mark {
      opacity: 0.7;
      margin-right: 0.3rem;
      color: var(--cyan);
      vertical-align: -0.15em;
    }
    .mic-mark svg { width: 0.9em; height: 0.9em; display: inline-block; }

    /* ---- holographic math-answer screen (tuned — do not restyle) -------- */
    .hologram {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: none;
      padding: 0.6rem 1.2rem 0.65rem;
      min-width: 5.5rem;
      text-align: center;
      font-family: "Consolas", ui-monospace, monospace;
      color: #b6f0ff;
      background: linear-gradient(180deg, rgba(20, 80, 120, 0.28), rgba(10, 40, 70, 0.18));
      border: 1px solid rgba(120, 220, 255, 0.7);
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(80, 200, 255, 0.5), inset 0 0 8px rgba(80, 200, 255, 0.2);
      text-shadow: 0 0 6px rgba(120, 220, 255, 0.9);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
      transition: opacity 0.15s linear;
      z-index: 4;
    }
    .holo-expr { font-size: 1.05rem; opacity: 0.85; letter-spacing: 0.03em; }
    .holo-answer { font-size: 2.2rem; font-weight: 700; line-height: 1.1; }
    @keyframes holo-in {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    .holo-in { animation: holo-in 0.25s ease-out; }

    /* ---- footer / input bar --------------------------------------------- */
    footer {
      display: flex;
      gap: 0.55rem;
      padding: 0.8rem 1.1rem;
      background: linear-gradient(0deg, rgba(20, 22, 38, 0.6), rgba(10, 11, 20, 0.3));
      border-top: 1px solid var(--line);
      box-shadow: 0 -1px 0 rgba(95, 217, 255, 0.06);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    button {
      font: inherit;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      padding: 0.55rem 1.05rem;
      background: rgba(38, 40, 58, 0.7);
      color: var(--text);
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.06s, box-shadow 0.18s;
    }
    button:hover { background: rgba(52, 55, 80, 0.85); border-color: var(--line-strong); }
    button:active { transform: translateY(1px); }
    button svg { width: 1.2em; height: 1.2em; display: block; flex: none; }

    /* emote button — icon chip */
    #emote {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.55rem 0.75rem;
    }
    #emote:active { transform: scale(0.92); }

    /* hold-to-talk — primary action */
    #talk {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      font-weight: 600;
      color: #06121a;
      background: linear-gradient(180deg, #8fe7ff, var(--cyan));
      border-color: rgba(95, 217, 255, 0.6);
      box-shadow: 0 0 0 rgba(95, 217, 255, 0);
    }
    #talk:hover { background: linear-gradient(180deg, #a6edff, #74ddff); }
    #talk.recording {
      color: #fff;
      background: linear-gradient(180deg, #ff6f86, #d83a55);
      border-color: rgba(255, 120, 140, 0.7);
      box-shadow: 0 0 14px rgba(216, 58, 85, 0.55);
      animation: rec-pulse 1.1s ease-in-out infinite;
    }
    @keyframes rec-pulse { 50% { box-shadow: 0 0 22px rgba(216, 58, 85, 0.85); } }

    #text {
      flex: 1;
      font: inherit;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      padding: 0.55rem 0.85rem;
      background: rgba(10, 11, 20, 0.7);
      color: var(--text);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    #text::placeholder { color: #5e6080; }
    #text:focus {
      border-color: rgba(95, 217, 255, 0.65);
      box-shadow: 0 0 0 3px rgba(95, 217, 255, 0.12);
    }
    /* send — accent outline, icon-only */
    #send {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.55rem 0.85rem;
      color: var(--cyan-soft);
      border-color: rgba(95, 217, 255, 0.5);
      background: rgba(20, 40, 56, 0.6);
    }
    #send:hover { background: rgba(28, 56, 78, 0.8); }

    /* ---- toasts ---------------------------------------------------------- */
    #toasts {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: min(420px, 80vw);
      z-index: 20;
    }
    .toast {
      background: rgba(60, 24, 33, 0.92);
      border: 1px solid #8a3a4a;
      border-left: 3px solid #ff6f86;
      color: #f4dde1;
      padding: 0.65rem 0.95rem;
      border-radius: 10px;
      font-size: 0.85rem;
      white-space: pre-wrap;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      animation: toast-in 0.18s ease-out;
    }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
</head>
<body>
  <header>
    <button id="menu-toggle" type="button" title="Customize" aria-label="Customize">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="16" rx="2" />
        <line x1="9" y1="4" x2="9" y2="20" />
      </svg>
    </button>
    <div class="brand">
      <span class="brand-orb"></span>
      <h1>Kanee</h1>
      <span class="brand-sub">virtual companion</span>
    </div>
    <span id="state">idle</span>
    <span id="conn">connecting…</span>
  </header>

  <main id="stage">
    <aside id="sidebar">
      <div class="side-head">
        <span>Customize</span>
        <button id="side-close" type="button" title="Close" aria-label="Close customization">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <section class="side-sec">
        <h2>Outfit</h2>
        <div id="outfit-list" class="side-list"></div>
      </section>
      <section class="side-sec">
        <h2>Emotes</h2>
        <div id="emote-list" class="side-grid"></div>
      </section>
    </aside>
    <div id="viewport">
      <div id="viewport-msg" hidden></div>
      <aside id="log"></aside>
    </div>
  </main>

  <footer>
    <button id="talk" type="button" title="Hold to talk (or hold Space)" aria-label="Hold to talk">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="9" y="2" width="6" height="12" rx="3" />
        <path d="M5 10a7 7 0 0 0 14 0" />
        <line x1="12" y1="19" x2="12" y2="22" />
      </svg>
      <span>Hold to talk</span>
    </button>
    <input id="text" type="text" placeholder="Type a message…" autocomplete="off" />
    <button id="send" type="button" title="Send" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="22" y1="2" x2="11" y2="13" />
        <polygon points="22 2 15 22 11 13 2 9 22 2" />
      </svg>
    </button>
  </footer>

  <div id="toasts"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
