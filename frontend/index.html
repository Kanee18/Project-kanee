<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kanee</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #14141c;
      color: #e8e8f0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid #2a2a3a;
    }
    header h1 { font-size: 1.05rem; margin: 0; letter-spacing: 0.02em; }
    #state {
      font-size: 0.72rem;
      padding: 0.15rem 0.65rem;
      border-radius: 999px;
      background: #2a2a3a;
      color: #9a9ab0;
      text-transform: capitalize;
      transition: background 0.2s, color 0.2s;
    }
    #state.listening { background: #1d4030; color: #7be0a8; }
    #state.thinking  { background: #3d3520; color: #e8c66a; }
    #state.speaking  { background: #20304d; color: #7ab4f0; }
    #conn { margin-left: auto; font-size: 0.7rem; color: #666; }
    #conn.ok { color: #5a9; }

    #stage {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    #viewport {
      flex: 1;
      position: relative;
      min-width: 0;
      background: #101018;
    }
    #viewport canvas { display: block; }
    #viewport-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #777;
      font-size: 0.9rem;
      padding: 2rem;
      pointer-events: none;
      white-space: pre-line;
    }
    /* stream-chat overlay: compact rows over the right edge of the stage */
    #log {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(340px, 38vw);
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow-y: auto;
      background: linear-gradient(to left, rgba(8, 8, 14, 0.45), transparent);
      scrollbar-width: thin;
    }
    #log::before { content: ""; flex: 1 0 auto; } /* pin messages to the bottom */
    .msg {
      font-size: 0.85rem;
      line-height: 1.35;
      padding: 0.28rem 0.55rem;
      border-radius: 6px;
      background: rgba(10, 10, 18, 0.6);
      white-space: pre-wrap;
      overflow-wrap: break-word;
      animation: chat-in 0.15s ease-out;
    }
    .msg .name { font-weight: 700; margin-right: 0.45rem; }
    .msg.user .name  { color: #6ea8ff; }
    .msg.kanee .name { color: #c792ea; }
    @keyframes chat-in { from { opacity: 0; transform: translateX(8px); } }
    .seg + .seg::before { content: " "; }
    .seg-tags {
      color: #62628a;
      font-size: 0.62rem;
      margin-right: 0.25rem;
      -webkit-user-select: none;
      user-select: none;
    }
    .mic-mark { opacity: 0.6; margin-right: 0.3rem; }

    /* emote button (left of the message bar) */
    #emote { font-size: 1.15rem; line-height: 1; padding: 0.5rem 0.7rem; }
    #emote:active { transform: scale(0.92); }

    footer {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid #2a2a3a;
    }
    button {
      font: inherit;
      border: none;
      border-radius: 10px;
      padding: 0.55rem 1rem;
      background: #2e2e42;
      color: #e8e8f0;
      cursor: pointer;
    }
    button:hover { background: #3a3a55; }
    #talk { touch-action: none; -webkit-user-select: none; user-select: none; }
    #talk.recording { background: #7a2638; }
    #text {
      flex: 1;
      font: inherit;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.55rem 0.8rem;
      background: #1b1b26;
      color: #e8e8f0;
      outline: none;
    }
    #text:focus { border-color: #4a4a70; }

    #toasts {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: min(420px, 80vw);
      z-index: 10;
    }
    .toast {
      background: #58222e;
      border: 1px solid #7a3242;
      color: #f0d8dc;
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      font-size: 0.85rem;
      white-space: pre-wrap;
      animation: toast-in 0.15s ease-out;
    }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-6px); } }
  </style>
</head>
<body>
  <header>
    <h1>Kanee</h1>
    <span id="state">idle</span>
    <span id="conn">connecting…</span>
  </header>

  <main id="stage">
    <div id="viewport">
      <div id="viewport-msg" hidden></div>
      <aside id="log"></aside>
    </div>
  </main>

  <footer>
    <button id="emote" type="button" title="Play emote">&#128526;</button>
    <button id="talk" type="button" title="Hold to talk (or hold Space)">&#127908; Hold to talk</button>
    <input id="text" type="text" placeholder="Type a message…" autocomplete="off" />
    <button id="send" type="button">Send</button>
  </footer>

  <div id="toasts"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
