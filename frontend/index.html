<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kanee</title>
</head>
<body>
  <div id="viewport">
    <div id="viewport-msg" hidden></div>
  </div>

  <div id="topbar">
    <div class="bar-left">
      <button id="menu-toggle" class="chip" type="button" title="Customize" aria-label="Customize">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="16" rx="2" />
          <line x1="9" y1="4" x2="9" y2="20" />
        </svg>
      </button>
      <button id="history-toggle" class="chip" type="button" title="History" aria-label="Conversation history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
      </button>
    </div>
    <div class="status">
      <span id="state" class="chip">idle</span>
      <span id="conn" class="chip">connecting…</span>
    </div>
  </div>

  <aside id="sidebar">
    <div class="side-head">
      <span>Customize</span>
      <button id="side-close" type="button" title="Close" aria-label="Close customization">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <section class="side-sec">
      <h2>Outfit</h2>
      <div id="outfit-list" class="side-list"></div>
    </section>
    <section class="side-sec">
      <h2>Emotes</h2>
      <div id="emote-list" class="side-grid"></div>
    </section>
  </aside>

  <section id="dialogue">
    <div id="nameplate" data-name="Kanee">Kanee</div>
    <div id="dialogue-text"></div>
    <div id="inputbar">
      <button id="talk" type="button" title="Hold to talk (or hold Space)" aria-label="Hold to talk">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="2" width="6" height="12" rx="3" />
          <path d="M5 10a7 7 0 0 0 14 0" />
          <line x1="12" y1="19" x2="12" y2="22" />
        </svg>
        <span>Hold to talk</span>
      </button>
      <input id="text" type="text" placeholder="Type a message…" autocomplete="off" />
      <button id="send" type="button" title="Send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
  </section>

  <div id="backlog" hidden>
    <div id="backlog-panel">
      <div class="backlog-head">
        <span>History</span>
        <button id="backlog-close" type="button" title="Close" aria-label="Close history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div id="backlog-list"></div>
    </div>
  </div>

  <div id="toasts"></div>
  <script type="module" src="/src/entry.js"></script>
</body>
</html>
