# Auto-build and deploy the LANDING site to Firebase Hosting on push to main.
#
# Only the landing site is deployed here — it's fully static. The companion app
# needs a live backend (WebSocket + GPT-SoVITS), so it isn't auto-deployed.
#
# One-time GitHub setup (repo → Settings):
#   Secrets:
#     FIREBASE_SERVICE_ACCOUNT  — JSON for a service account with the
#                                 "Firebase Hosting Admin" role (paste the whole
#                                 file). Create it in Google Cloud console.
#   Variables (not secret — the Firebase web config is public):
#     FIREBASE_API_KEY, FIREBASE_AUTH_DOMAIN, FIREBASE_PROJECT_ID,
#     FIREBASE_STORAGE_BUCKET, FIREBASE_MESSAGING_SENDER_ID, FIREBASE_APP_ID,
#     CHAT_URL, SITE_URL, BETA_CONTACT
#
# Also commit a real .firebaserc (project id + the "landing" site mapping).

name: Deploy landing site

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "shared/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      # If the deploy secret isn't set yet, skip the rest gracefully (green run)
      # instead of failing. Set FIREBASE_SERVICE_ACCOUNT to enable auto-deploy.
      - name: Check deploy config
        id: check
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy — set the FIREBASE_SERVICE_ACCOUNT secret (and the FIREBASE_* variables) to enable auto-deploy. See landing/SETUP.md."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # Recreate the gitignored shared Firebase config from repo variables.
      # Values are passed via env (never interpolated as ${{ }} INTO the shell
      # body) and emitted with JSON.stringify, so a value containing quotes or
      # shell metacharacters can't break out or corrupt the file.
      - name: Write shared/firebase-config.js
        if: steps.check.outputs.ready == 'true'
        env:
          FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          CHAT_URL: ${{ vars.CHAT_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
          BETA_CONTACT: ${{ vars.BETA_CONTACT }}
        run: |
          node <<'EOF'
          const fs = require("fs");
          const e = process.env;
          const cfg = {
            apiKey: e.FIREBASE_API_KEY,
            authDomain: e.FIREBASE_AUTH_DOMAIN,
            projectId: e.FIREBASE_PROJECT_ID,
            storageBucket: e.FIREBASE_STORAGE_BUCKET,
            messagingSenderId: e.FIREBASE_MESSAGING_SENDER_ID,
            appId: e.FIREBASE_APP_ID,
          };
          const out =
            "export const firebaseConfig = " + JSON.stringify(cfg, null, 2) + ";\n" +
            "export const CHAT_URL = " + JSON.stringify(e.CHAT_URL || "") + ";\n" +
            "export const SITE_URL = " + JSON.stringify(e.SITE_URL || "") + ";\n" +
            "export const BETA_CONTACT = " + JSON.stringify(e.BETA_CONTACT || "") + ";\n";
          fs.writeFileSync("shared/firebase-config.js", out);
          console.log("wrote shared/firebase-config.js");
          EOF

      - name: Install & build
        if: steps.check.outputs.ready == 'true'
        working-directory: landing
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting (landing target)
        if: steps.check.outputs.ready == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          target: landing
          channelId: live
