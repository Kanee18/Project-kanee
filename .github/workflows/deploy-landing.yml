# Auto-build and deploy the LANDING site to Firebase Hosting on push to main.
#
# Only the landing site is deployed here — it's fully static. The companion app
# needs a live backend (WebSocket + GPT-SoVITS), so it isn't auto-deployed.
#
# One-time GitHub setup (repo → Settings):
#   Secrets:
#     FIREBASE_SERVICE_ACCOUNT  — JSON for a service account with the
#                                 "Firebase Hosting Admin" role (paste the whole
#                                 file). Create it in Google Cloud console.
#   Variables (not secret — the Firebase web config is public):
#     FIREBASE_API_KEY, FIREBASE_AUTH_DOMAIN, FIREBASE_PROJECT_ID,
#     FIREBASE_STORAGE_BUCKET, FIREBASE_MESSAGING_SENDER_ID, FIREBASE_APP_ID,
#     CHAT_URL, SITE_URL, BETA_CONTACT
#
# Also commit a real .firebaserc (project id + the "landing" site mapping).

name: Deploy landing site

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "shared/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      # Recreate the gitignored shared Firebase config from repo variables.
      - name: Write shared/firebase-config.js
        run: |
          cat > shared/firebase-config.js <<'EOF'
          export const firebaseConfig = {
            apiKey: "${{ vars.FIREBASE_API_KEY }}",
            authDomain: "${{ vars.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ vars.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ vars.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ vars.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ vars.FIREBASE_APP_ID }}",
          };
          export const CHAT_URL = "${{ vars.CHAT_URL }}";
          export const SITE_URL = "${{ vars.SITE_URL }}";
          export const BETA_CONTACT = "${{ vars.BETA_CONTACT }}";
          EOF

      - name: Install & build
        working-directory: landing
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting (landing target)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          target: landing
          channelId: live
